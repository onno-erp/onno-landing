name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TS=$(date -u +%s)
          BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "tag=${BRANCH}-${SHORT_SHA}-${TS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/onno-erp/onno-landing:${{ steps.meta.outputs.tag }}
            ghcr.io/onno-erp/onno-landing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

